<style>
:root{--bg:#09090b;--card:#18181b;--border:#27272a;--accent:#3b82f6;--text:#fafafa;--text-sub:#a1a1aa;--success:#22c55e;--error:#ef4444;--input:#0c0c0e}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;margin:0;padding:5px;overflow-x:hidden;line-height:1.6;-webkit-user-select:none;user-select:none}.hidden{display:none!important}.container{max-width:480px;margin:0 auto}.main-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:5px;position:relative}.cover-wrapper{position:relative;width:100%;background:#000;aspect-ratio:16/9}.cover-img{width:100%;height:100%;object-fit:cover;display:block}.mod-title-overlay{position:absolute;bottom:10px;right:10px;background:rgba(24,24,27,0.75);backdrop-filter:blur(4px);padding:5px 10px;border-radius:8px;font-size:13px;color:#fff;max-width:85%;border:1px solid rgba(255,255,255,0.1)}.meta-section{padding:15px}.publisher-line{display:flex;align-items:center;gap:10px;margin-bottom:15px;cursor:pointer}.pub-avatar{width:45px;height:45px;border-radius:50%;border:2px solid var(--accent);object-fit:cover}.pub-name{font-weight:700;font-size:0.9rem;display:flex;align-items:center;gap:5px}.verified-badge{color:var(--accent);font-size:0.85rem}.admin-badge{position:relative;color:#fbbf24;font-size:1rem;display:flex;align-items:center;justify-content:center}.admin-badge .fa-check{position:absolute;font-size:0.45rem;color:var(--card)}.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:15px;background:var(--input);padding:12px;border-radius:15px;border:1px solid var(--border)}.info-item{font-size:0.7rem;color:var(--text-sub);display:flex;align-items:center;gap:5px}.info-item i{color:var(--accent);width:12px}.interaction-bar{display:flex;justify-content:space-between;padding:12px 5px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:15px}.stat-btn{background:transparent;border:none;color:var(--text-sub);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:0.7rem;cursor:pointer;transition:0.2s;outline:none}.stat-btn i{font-size:1.1rem}.stat-btn.active-like{color:var(--success)}.stat-btn.active-dislike{color:var(--error)}.dl-button{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:0.95rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:0.2s;outline:none}.dl-button:active{transform:scale(0.96);opacity:0.9}.dl-button span{font-size:0.65rem;font-weight:400;opacity:0.8;margin-top:2px}.desc-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:5px}.desc-card h3{margin:0 0 10px;font-size:0.9rem;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:8px}.desc-content{font-size:0.85rem;color:var(--text-sub);white-space:pre-wrap}.ad-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:12px}.btn-row{display:flex;gap:8px}.btn-sub{flex:1;padding:10px;border-radius:10px;background:var(--input);border:1px solid var(--border);color:var(--text);font-size:0.75rem;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;transition:0.2s;pointer-events:auto;-webkit-touch-callout:none}.action-float{position:fixed;top:15px;left:15px;display:flex;gap:8px;z-index:100}.mini-btn{width:33px;height:33px;border-radius:10px;background:rgba(24,24,27,0.8);backdrop-filter:blur(8px);border:1px solid var(--border);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.2s}.mini-btn:active{transform:scale(0.9);background:var(--accent)}.skeleton{background:linear-gradient(90deg,#18181b 25%,#27272a 50%,#18181b 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}.toast{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--text);padding:10px 20px;border-radius:10px;border:1px solid var(--accent);font-size:0.8rem;z-index:2000;display:none;box-shadow:0 10px 25px rgba(0,0,0,0.5)}@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}.cm-card{background:var(--card);border:1px solid var(--border);border-radius:18px;margin-bottom:5px;display:flex;flex-direction:column;max-height:500px}.cm-header{padding:10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--input);border-radius:18px 18px 0 0}.cm-tools{display:flex;gap:10px;align-items:center}.cm-btn-icon{background:none;border:none;color:var(--accent);font-size:1.1rem;cursor:pointer}.cm-count{font-size:0.75rem;color:var(--text-sub);font-weight:600}.cm-list{padding:10px;overflow-y:auto;flex-grow:1;min-height:60px}.cm-empty{text-align:center;color:var(--text-sub);font-size:0.8rem;padding:20px 0}.cm-item{margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px}.cm-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}.cm-avatar{width:28px;height:28px;border-radius:50%;background:#000;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);object-fit:cover}.cm-name{font-size:0.75rem;font-weight:700;color:var(--text);cursor:pointer}.cm-body{background:var(--input);padding:8px 12px;border-radius:10px;font-size:0.8rem;color:var(--text-sub);margin-bottom:6px;word-break:break-word}.cm-footer{display:flex;justify-content:space-between;align-items:center;font-size:0.65rem}.cm-actions{display:flex;gap:12px;color:var(--text-sub)}.cm-action-btn{cursor:pointer;display:flex;align-items:center;gap:3px}.cm-action-btn.active{color:var(--accent)}.cm-date{color:var(--text-sub);direction:ltr}.cm-replies{margin-top:8px;margin-right:20px;padding-right:10px;border-right:2px solid var(--border)}.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:3000;display:none;align-items:center;justify-content:center;padding:15px}.modal-content{background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:400px;padding:20px;position:relative}.modal-title{margin:0 0 15px;font-size:1rem;color:var(--accent);display:flex;align-items:center;gap:8px}.form-group{margin-bottom:12px}.form-group label{display:block;font-size:0.7rem;color:var(--text-sub);margin-bottom:5px}.form-input{width:100%;background:var(--input);border:1px solid var(--border);padding:10px;border-radius:10px;color:var(--text);font-size:0.8rem;outline:none}.form-input:focus{border-color:var(--accent)}.modal-actions{display:flex;gap:10px;margin-top:20px}.btn-main{flex:1;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:700;cursor:pointer}.btn-sec{background:var(--input);border:1px solid var(--border);color:var(--text)}.help-tip{position:absolute;top:20px;left:20px;color:var(--text-sub);cursor:pointer}img{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-user-drag:none}
</style>

<div class="action-float">
<div class="mini-btn" onclick="copyPageLink()"><i class="fas fa-link"></i></div>
<div class="mini-btn" onclick="sharePage()"><i class="fas fa-share-alt"></i></div>
</div>
<div class="container" id="mainContent">
<div id="loading"><div class="main-card skeleton" style="height:550px"></div></div>
<div id="modDetails" class="hidden">
<div class="main-card">
<div class="cover-wrapper"><img id="m_cover" class="cover-img"><div id="m_title" class="mod-title-overlay"></div></div>
<div class="meta-section">
<div class="publisher-line" id="publisherAction"><img id="u_avatar" class="pub-avatar"><span id="u_name" class="pub-name"></span></div>
<div class="info-grid">
<div class="info-item"><i class="fas fa-calendar-plus"></i> <span id="m_date"></span></div>
<div class="info-item" id="edit_box"><i class="fas fa-history"></i> <span id="m_edit"></span></div>
<div class="info-item" id="ver_box"><i class="fas fa-layer-group"></i> <span id="m_ver"></span></div>
<div class="info-item" id="mc_box"><i class="fas fa-cube"></i> <span id="m_mc"></span></div>
<div class="info-item"><i class="fas fa-folder"></i> <span id="m_type"></span></div>
</div>

<button class="stat-btn" id="btnDis" onclick="handleVote('dislike')"><i class="fas fa-thumbs-down"></i><span id="c_dis">0</span></button>
<button class="stat-btn"><i class="fas fa-eye"></i><span id="c_views">0</span></button>

</div>

<span id="dlDomain">جارٍ التحقق...</span>
</button>
</div>
</div>

<div class="cm-card">
<div class="cm-header">
<button class="cm-btn-icon" onclick="openCmModal()"><i class="fas fa-plus-circle"></i></button>
<div class="cm-count" id="cmTotal">0 تعليق</div>
<button class="cm-btn-icon" onclick="toggleCmSort()"><i class="fas fa-sort-amount-down" id="sortIcon"></i></button>
</div>

<a href="https://tamaa-pro.github.io/minecraft_bedrock_library" class="btn-sub" oncontextmenu="return false;"><i class="fas fa-download"></i> تطبيق المكتبة</a>
</div>
</div>

<div class="modal" id="cmModal">
<div class="modal-content">
<i class="fas fa-question-circle help-tip" onclick="showCmHelp()"></i>
<h3 class="modal-title" id="modalTitle">نشر تعليق</h3>
<div class="form-group" id="groupIcon">
<label>رابط صورة الحساب (اختياري)</label>
<input type="url" id="f_icon" class="form-input" placeholder="https://...">
</div>

</div>

</div>

</div>

<input type="password" id="f_code" class="form-input" maxlength="20">
</div>

<button class="btn-main" id="cmSubmitBtn" onclick="submitComment()">نشر</button>

<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
<script>
const AW_CONF={p:'69922bf4002571605f46',d:'69922c8e001dbb613d69',c_m:'mods',c_c:'comments'};
const {Client,Databases,Query,ID}=Appwrite;
const sdk=new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject(AW_CONF.p);
const db=new Databases(sdk);
const modId=window.location.hash.substring(1);
let modData=null,authorData=null,allComments=[],currentSort='desc',editingId=null,replyToId=null;
const formatDT=s=>new Date(s).toLocaleString('ar-EG-u-nu-latn',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
const getDomain=u=>{try{return new URL(u).hostname.replace('www.','');}catch(e){return 'رابط خارجي';}};
async function loadPage(){
if(!modId)return;
try{
modData=await db.getDocument(AW_CONF.d,AW_CONF.c_m,modId);
await fetchUser(modData.author_handle);
render();
await loadComments();
trackStat('view','v_seen_');
}catch(e){document.body.innerHTML="<div style='padding:50px;text-align:center'>404</div>";}
finally{const l=document.getElementById('loading');if(l)l.remove();document.getElementById('modDetails').classList.remove('hidden');}
}
function render(){
document.getElementById('m_cover').src=modData.cover_url;
document.getElementById('m_title').innerText=modData.title;
document.getElementById('m_date').innerText=formatDT(modData.$createdAt);
if(modData.updated_at&&modData.updated_at!==modData.$createdAt){
document.getElementById('m_edit').innerText=formatDT(modData.updated_at);
document.getElementById('edit_box').classList.remove('hidden');
}else{document.getElementById('edit_box').classList.add('hidden');}
if(modData.mod_version)document.getElementById('m_ver').innerText=modData.mod_version;else document.getElementById('ver_box').classList.add('hidden');
if(modData.target_mc)document.getElementById('m_mc').innerText=modData.target_mc;else document.getElementById('mc_box').classList.add('hidden');
document.getElementById('m_type').innerText=modData.item_type;
document.getElementById('dlDomain').innerText=getDomain(modData.download_url);
document.getElementById('m_long').innerHTML=modData.long_desc;
document.getElementById('dlAction').onclick=()=>{trackStat('download','v_dl_');window.location.href=modData.download_url;};
updateCountersUI();applyVoteStyles();
}
function updateCountersUI(){
document.getElementById('c_likes').innerText=(modData.likes||0).toLocaleString('ar-EG-u-nu-latn');
document.getElementById('c_dis').innerText=(modData.dislikes||0).toLocaleString('ar-EG-u-nu-latn');
document.getElementById('c_views').innerText=(modData.views||0).toLocaleString('ar-EG-u-nu-latn');
document.getElementById('c_dl').innerText=(modData.downloads||0).toLocaleString('ar-EG-u-nu-latn');
}
async function trackStat(t,p){
const k=p+modId,l=localStorage.getItem(k),n=Date.now();
if(l&&(n-l<86400000))return;
const u={};u[t==='view'?'views':'downloads']=(modData[t==='view'?'views':'downloads']||0)+1;
try{await db.updateDocument(AW_CONF.d,AW_CONF.c_m,modId,u);localStorage.setItem(k,n);}catch(e){}
}
async function handleVote(v){
const k='v_vote_'+modId,old=localStorage.getItem(k);
let u={likes:modData.likes||0,dislikes:modData.dislikes||0};
if(old===v){u[v==='like'?'likes':'dislikes']--;localStorage.removeItem(k);}
else{if(old)u[old==='like'?'likes':'dislikes']--;u[v==='like'?'likes':'dislikes']++;localStorage.setItem(k,v);}
modData.likes=u.likes;modData.dislikes=u.dislikes;
updateCountersUI();applyVoteStyles();
try{await db.updateDocument(AW_CONF.d,AW_CONF.c_m,modId,u);}catch(e){}
}
function applyVoteStyles(){
const v=localStorage.getItem('v_vote_'+modId);
document.getElementById('btnLike').className='stat-btn'+(v==='like'?' active-like':'');
document.getElementById('btnDis').className='stat-btn'+(v==='dislike'?' active-dislike':'');
}
async function fetchUser(h){
try{
const res=await fetch(`https://api.jsonbin.io/v3/b/69a3f2b1d0ea881f40e41d45/latest`,{headers:{"X-Master-Key":"$2a$10$F5TR7pSKPRRNAeBzsdxQ4.NYog8xHGUi0hektkor0q/QWFVXzba3q"}});
const r=(await res.json()).record.us;authorData=r.find(u=>"@"+u.username===h);
if(authorData){
document.getElementById('u_avatar').src=authorData.avatar;
let v='';if(authorData.vf==='true')v='<i class="fas fa-check-circle verified-badge"></i>';
else if(authorData.vf==='admin')v='<span class="admin-badge"><i class="fas fa-certificate"></i><i class="fas fa-check"></i></span>';
document.getElementById('u_name').innerHTML=`${authorData.full_name} ${v}`;
document.getElementById('publisherAction').onclick=()=>window.location.href=`../user/#${authorData.username}`;
}
}catch(e){}
}
async function loadComments(){
try{
const res=await db.listDocuments(AW_CONF.d,AW_CONF.c_c,[Query.equal('edit-code',modId),Query.orderDesc('$createdAt')]);
allComments=res.documents;renderComments();
}catch(e){}
}
function renderComments(){
const list=document.getElementById('cmList');
const countEl=document.getElementById('cmTotal');
if(allComments.length===0){list.innerHTML='<div class="cm-empty">لا توجد تعليقات بعد على هذا المود ¯\\_(ツ)_/¯</div>';countEl.innerText='0 تعليق';return;}
countEl.innerText=`${allComments.filter(c=>!c.reply).length} تعليق`;
let sorted=[...allComments].sort((a,b)=>currentSort==='desc'?new Date(b.$createdAt)-new Date(a.$createdAt):new Date(a.$createdAt)-new Date(b.$createdAt));
const main=sorted.filter(c=>!c.reply);
list.innerHTML='';
if(main.length>0)list.style.height='350px';
main.forEach(c=>{
const item=createCmElement(c);
const replies=sorted.filter(r=>r.reply===c.$id);
if(replies.length>0){
const repBox=document.createElement('div');repBox.className='cm-replies hidden';repBox.id=`reps_${c.$id}`;
replies.forEach(r=>repBox.appendChild(createCmElement(r,true)));
item.appendChild(repBox);
}
list.appendChild(item);
});
}
function createCmElement(c,isRep=false){
const div=document.createElement('div');div.className='cm-item';
const isAuth=c.name.startsWith('@')&&authorData&&c.name==="@"+authorData.username;
const v=isAuth?(authorData.vf==='admin'?'<span class="admin-badge" style="font-size:0.6rem"><i class="fas fa-certificate"></i><i class="fas fa-check"></i></span>':(authorData.vf==='true'?'<i class="fas fa-check-circle verified-badge" style="font-size:0.6rem"></i>':'')):'';
const av=isAuth?authorData.avatar:(c.icon||'');
const avHtml=av?`<img src="${av}" class="cm-avatar">`:`<div class="cm-avatar"><i class="fas fa-user" style="font-size:0.8rem"></i></div>`;
const liked=localStorage.getItem('cv_'+c.$id)==='like',dis=localStorage.getItem('cv_'+c.$id)==='dislike';
div.innerHTML=`
<div class="cm-top">${avHtml}<span class="cm-name" onclick="if('${c['contact-link']}')window.open('${c['contact-link']}')">${isAuth?authorData.full_name:c.name} ${v}</span></div>
<div class="cm-body">${c.comment}</div>
<div class="cm-footer">
<div class="cm-actions">
<span class="cm-action-btn ${liked?'active':''}" onclick="voteCm('${c.$id}','like')"><i class="fas fa-thumbs-up"></i> ${c.like||0}</span>
<span class="cm-action-btn ${dis?'active':''}" onclick="voteCm('${c.$id}','dislike')"><i class="fas fa-thumbs-down"></i> ${c.dislike||0}</span>
${!isRep?`<span class="cm-action-btn" onclick="toggleReps('${c.$id}')"><i class="fas fa-reply"></i> رد</span>`:''}
<span class="cm-action-btn" onclick="editCmPrompt('${c.$id}')"><i class="fas fa-edit"></i></span>
</div>
<div class="cm-date">${formatDT(c.$createdAt)}</div>
</div>`;
return div;
}
function toggleReps(id){
const box=document.getElementById(`reps_${id}`);
if(box)box.classList.toggle('hidden');
else{replyToId=id;openCmModal();document.getElementById('modalTitle').innerText='رد على التعليق';}
}
function openCmModal(){
const m=document.getElementById('cmModal');m.style.display='flex';
const saved=JSON.parse(localStorage.getItem('cm_user')||'{}');
if(saved.name){
document.getElementById('f_name').value=saved.name;
document.getElementById('f_icon').value=saved.icon||'';
document.getElementById('f_contact').value=saved.contact||'';
document.getElementById('f_code').value=saved.code||'';
checkAuthor(saved.name);
}
}
function closeCmModal(){
document.getElementById('cmModal').style.display='none';editingId=null;replyToId=null;
document.getElementById('modalTitle').innerText='نشر تعليق';
document.getElementById('cmDeleteBtn').classList.add('hidden');
document.getElementById('cmSubmitBtn').innerText='نشر';
}
function checkAuthor(v){
const g=document.getElementById('groupIcon');
if(v.startsWith('@')&&authorData&&v==="@"+authorData.username){g.classList.add('hidden');}
else{g.classList.remove('hidden');}
}
async function submitComment(){
const name=document.getElementById('f_name').value.trim(),
icon=document.getElementById('f_icon').value.trim(),
comment=document.getElementById('f_comment').value.trim(),
contact=document.getElementById('f_contact').value.trim(),
code=document.getElementById('f_code').value.trim();
if(name.length<3||comment.length<3||code.length<4){msg("يرجى إكمال البيانات المطلوبة");return;}
if(contact&&!/facebook\.com|instagram\.com/i.test(contact)){msg("روابط فيسبوك وانستاجرام فقط!");return;}
if(/[^a-zA-Z0-9!@#$%^&*()_+]/.test(code)){msg("الرمز يجب أن يكون لاتيني وبدون فراغات");return;}
const data={name,icon,comment,"contact-link":contact,"edit-code":modId,reply:replyToId||""};
const isAuth=name.startsWith('@')&&authorData&&name==="@"+authorData.username;
if(isAuth&&code!==modData.author_handle.replace('@','')){msg("رمز التحقق للناشر غير صحيح");return;}
localStorage.setItem('cm_user',JSON.stringify({name,icon,contact,code}));
try{
if(editingId){
await db.updateDocument(AW_CONF.d,AW_CONF.c_c,editingId,{comment});
msg("تم التعديل بنجاح");
}else{
await db.createDocument(AW_CONF.d,AW_CONF.c_c,ID.unique(),data);
msg("تم النشر بنجاح");
}
closeCmModal();loadComments();
}catch(e){msg("فشلت العملية، حاول لاحقاً");}
}
async function editCmPrompt(id){
const c=allComments.find(x=>x.$id===id);
const inputCode=prompt("أدخل رمز التعديل الخاص بهذا التعليق:");
if(!inputCode)return;
const saved=JSON.parse(localStorage.getItem('cm_user')||'{}');
if(inputCode!==saved.code){msg("رمز التعديل غير صحيح");return;}
editingId=id;openCmModal();
document.getElementById('modalTitle').innerText='تعديل التعليق';
document.getElementById('f_comment').value=c.comment;
document.getElementById('cmSubmitBtn').innerText='حفظ';
document.getElementById('cmDeleteBtn').classList.remove('hidden');
}
async function deleteComment(){
if(!confirm("هل أنت متأكد من الحذف؟"))return;
try{await db.deleteDocument(AW_CONF.d,AW_CONF.c_c,editingId);msg("تم الحذف");closeCmModal();loadComments();}catch(e){}
}
async function voteCm(id,type){
const k='cv_'+id,old=localStorage.getItem(k);
if(old===type)return;
const c=allComments.find(x=>x.$id===id);
let u={like:c.like||0,dislike:c.dislike||0};
if(old)u[old==='like'?'like':'dislike']--;
u[type==='like'?'like':'dislike']++;
localStorage.setItem(k,type);
try{await db.updateDocument(AW_CONF.d,AW_CONF.c_c,id,u);loadComments();}catch(e){}
}
function toggleCmSort(){
currentSort=currentSort==='desc'?'asc':'desc';
document.getElementById('sortIcon').className=`fas fa-sort-amount-${currentSort==='desc'?'down':'up'}`;
renderComments();
}
function msg(t){const el=document.getElementById('toast');el.innerText=t;el.style.display='block';setTimeout(()=>el.style.display='none',2500);}
function showCmHelp(){
alert("تعليمات التعليقات:\n1. الروابط المسموحة للتواصل هي FB و IG فقط.\n2. استخدام @اسم_المؤلف مع رمزه الخاص يظهرك كحساب موثق.\n3. رمز التعديل ضروري لحماية تعليقك من الحذف أو التغيير.\n4. لا يمكن الرد على الردود لضمان التنظيم.");
}
function copyPageLink(){navigator.clipboard.writeText(window.location.href).then(()=>msg("تم نسخ الرابط"));}
function sharePage(){if(navigator.share)navigator.share({url:window.location.href});}
window.onload=loadPage;
</script>
