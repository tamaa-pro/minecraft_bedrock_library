<style>

15px}.stat-btn{background:transparent;border:none;color:var(--text-sub);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:0.7rem;cursor:pointer;transition:0.2s;outline:none}.stat-btn i{font-size:1.1rem}.stat-btn.active-like{color:var(--success)}.stat-btn.active-dislike{color:var(--error)}.dl-button{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:0.95rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:0.2s;outline:none}.dl-button:active{transform:scale(0.96);opacity:0.9}.dl-button span{font-size:0.65rem;font-weight:400;opacity:0.8;margin-top:2px}.desc-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:5px}.desc-card h3{margin:0 0 10px;font-size:0.9rem;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:8px}.desc-content{font-size:0.85rem;color:var(--text-sub);white-space:pre-wrap}.ad-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:12px}.btn-row{display:flex;gap:8px}.btn-sub{flex:1;padding:10px;border-radius:10px;background:var(--input);border:1px solid var(--border);color:var(--text);font-size:0.75rem;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;transition:0.2s;-webkit-touch-callout:none;user-select:none}.btn-sub:active{transform:scale(0.95);background:var(--border)}.action-float{position:fixed;top:15px;left:15px;display:flex;gap:8px;z-index:100}.mini-btn{width:33px;height:33px;border-radius:10px;background:rgba(24,24,27,0.8);backdrop-filter:blur(8px);border:1px solid var(--border);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.2s}.mini-btn:active{transform:scale(0.9);background:var(--accent)}.skeleton{background:linear-gradient(90deg,#18181b 25%,#27272a 50%,#18181b 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}.toast{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--text);padding:10px 20px;border-radius:10px;border:1px solid var(--accent);font-size:0.8rem;z-index:1000;display:none;box-shadow:0 10px 25px rgba(0,0,0,0.5)}@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}img{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-user-drag:none}
.comm-card{background:var(--card);border:1px solid var(--border);border-radius:18px;margin-bottom:5px;display:flex;flex-direction:column;height:400px}.comm-header{padding:10px;background:var(--input);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;border-radius:18px 18px 0 0}.comm-title{font-size:0.8rem;font-weight:700}.comm-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px}.comment-item{background:var(--input);border:1px solid var(--border);border-radius:12px;padding:8px}.comment-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}.comm-avatar{width:28px;height:28px;border-radius:50%;background:#000;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);font-size:0.7rem;overflow:hidden}.comm-avatar img{width:100%;height:100%;object-fit:cover}.comm-user{font-size:0.75rem;font-weight:700}.comment-mid{background:var(--card);padding:8px;border-radius:8px;font-size:0.8rem;color:var(--text-sub);margin-bottom:6px;word-break:break-word}.comment-bot{display:flex;justify-content:space-between;align-items:center;font-size:0.65rem}.comm-actions{display:flex;gap:10px;align-items:center}.comm-act-btn{cursor:pointer;color:var(--text-sub);display:flex;align-items:center;gap:3px}.comm-act-btn:active{color:var(--accent)}.comm-date{color:var(--text-sub);direction:ltr}.nested-reply{margin-right:20px;border-right:2px solid var(--border);padding-right:10px;margin-top:5px}.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:2000;display:none;align-items:center;justify-content:center;padding:15px}.modal-content{background:var(--card);width:100%;max-width:400px;border-radius:20px;border:1px solid var(--border);padding:20px}.modal-header{font-size:1rem;font-weight:700;margin-bottom:15px;color:var(--accent)}.form-group{margin-bottom:12px}.form-group label{display:block;font-size:0.75rem;color:var(--text-sub);margin-bottom:5px}.form-group input,.form-group textarea{width:100%;background:var(--input);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:0.8rem;outline:none}.form-group textarea{height:80px;resize:none}.modal-footer{display:flex;gap:10px;margin-top:20px}.btn-main{flex:1;padding:12px;border-radius:10px;border:none;font-weight:700;cursor:pointer;font-size:0.85rem}.btn-save{background:var(--accent);color:#fff}.btn-del{background:var(--error);color:#fff}.btn-cancel{background:var(--border);color:var(--text)}

<div class="cover-wrapper"><img id="m_cover" class="cover-img"><div id="m_title" class="mod-title-overlay"></div></div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
<script>
const AW_CONF={p:'69922bf4002571605f46',d:'69922c8e001dbb613d69',c:'mods',cc:'comments'};
const {Client,Databases,Query}=Appwrite;
const sdk=new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject(AW_CONF.p);
const db=new Databases(sdk);
const modId=window.location.hash.substring(1);
let modData=null,allComments=[],sortDesc=true,currentEditDoc=null;
const formatDT=s=>new Date(s).toLocaleString('ar-EG-u-nu-latn',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
async function loadPage(){
if(!modId)return;
try{
modData=await db.getDocument(AW_CONF.d,AW_CONF.c,modId);
await fetchUser(modData.author_handle);
render();
await loadComments();
trackStat('view','v_seen_');
}catch(e){document.body.innerHTML="Error 404";}
finally{if(document.getElementById('loading'))document.getElementById('loading').remove();document.getElementById('modDetails').classList.remove('hidden');}
}
async function loadComments(){
try{
const res=await db.listDocuments(AW_CONF.d,AW_CONF.cc,[Query.limit(100),sortDesc?Query.orderDesc('$createdAt'):Query.orderAsc('$createdAt')]);
allComments=res.documents;
renderComments();
}catch(e){}
}
function renderComments(){
const list=document.getElementById('comm_list');
list.innerHTML='';
const main=allComments.filter(c=>!c.reply);
document.getElementById('total_comm').innerText=allComments.length;
main.forEach(c=>{
list.appendChild(createCommEl(c));
const replies=allComments.filter(r=>r.reply===c.$id);
replies.forEach(r=>{
const rel=createCommEl(r,true);
rel.classList.add('nested-reply');
list.appendChild(rel);
});
});
}
function createCommEl(c,isReply=false){
const div=document.createElement('div');
div.className='comment-item';
const iconHtml=c.icon?`<img src="${c.icon}">`:`<i class="fas fa-user-circle"></i>`;
div.innerHTML=`<div class="comment-top"><div class="comm-avatar">${iconHtml}</div><div class="comm-user">${c.name}</div></div>
<div class="comment-mid">${c.comment}</div>
<div class="comment-bot">
<div class="comm-actions">
<div class="comm-act-btn" onclick="voteComm('${c.$id}','like')"><i class="fas fa-thumbs-up"></i><span>${c.like||0}</span></div>
<div class="comm-act-btn" onclick="voteComm('${c.$id}','dislike')"><i class="fas fa-thumbs-down"></i><span>${c.dislike||0}</span></div>
${!isReply?`<div class="comm-act-btn" onclick="openReply('${c.$id}')"><i class="fas fa-reply"></i></div>`:''}
<div class="comm-act-btn" onclick="askVerify('${c.$id}')"><i class="fas fa-edit"></i></div>
</div>
<div class="comm-date">${formatDT(c.$createdAt)}</div>
</div>`;
return div;
}
function openCommModal(){
document.getElementById('modal_title').innerText='نشر تعليق جديد';
document.getElementById('btn_submit_comm').innerText='نشر';
document.getElementById('btn_delete_comm').classList.add('hidden');
document.getElementById('reply_to_id').value='';
document.getElementById('edit_target_id').value='';
document.getElementById('c_name').value=localStorage.getItem('c_p_name')||'';
document.getElementById('c_icon').value=localStorage.getItem('c_p_icon')||'';
document.getElementById('c_link').value=localStorage.getItem('c_p_link')||'';
document.getElementById('c_text').value='';
document.getElementById('commModal').style.display='flex';
}
function openReply(id){openCommModal();document.getElementById('modal_title').innerText='إضافة رد';document.getElementById('reply_to_id').value=id;}
function closeCommModal(){document.getElementById('commModal').style.display='none';}
async function submitComment(){
const name=document.getElementById('c_name').value.trim(),txt=document.getElementById('c_text').value.trim(),icon=document.getElementById('c_icon').value.trim(),link=document.getElementById('c_link').value.trim(),code=document.getElementById('c_code').value.trim(),repId=document.getElementById('reply_to_id').value,editId=document.getElementById('edit_target_id').value;
if(name.length<3||txt.length<3||!/^[A-Za-z#@&%!?]{4,20}$/.test(code))return alert('تحقق من البيانات والرمز (4-20 حرف لاتيني أو رموز #@&%!?)');
if(link&&!/(facebook|instagram)\.com/i.test(link))return alert('يسمح فقط بروابط فيسبوك وانستاجرام');
const data={name,comment:txt,icon:icon||null,'contact-link':link||null,'edit-code':code,reply:repId||null};
try{
if(editId){await db.updateDocument(AW_CONF.d,AW_CONF.cc,editId,data);}
else{await db.createDocument(AW_CONF.d,AW_CONF.cc,'unique()',data);localStorage.setItem('c_p_name',name);localStorage.setItem('c_p_icon',icon);localStorage.setItem('c_p_link',link);}
closeCommModal();loadComments();
}catch(e){alert('فشل في العملية');}
}
function askVerify(id){currentEditDoc=allComments.find(c=>c.$id===id);document.getElementById('check_code').value='';document.getElementById('passModal').style.display='flex';}
function verifyCode(){if(document.getElementById('check_code').value===currentEditDoc['edit-code']){document.getElementById('passModal').style.display='none';openEditModal();}else{alert('رمز خاطئ');}}
function openEditModal(){
openCommModal();
document.getElementById('modal_title').innerText='تعديل التعليق';
document.getElementById('btn_submit_comm').innerText='حفظ';
document.getElementById('btn_delete_comm').classList.remove('hidden');
document.getElementById('edit_target_id').value=currentEditDoc.$id;
document.getElementById('c_name').value=currentEditDoc.name;
document.getElementById('c_icon').value=currentEditDoc.icon||'';
document.getElementById('c_text').value=currentEditDoc.comment;
document.getElementById('c_link').value=currentEditDoc['contact-link']||'';
document.getElementById('c_code').value=currentEditDoc['edit-code'];
}
async function deleteComment(){
if(confirm('هل أنت متأكد؟')){try{await db.deleteDocument(AW_CONF.d,AW_CONF.cc,currentEditDoc.$id);closeCommModal();loadComments();}catch(e){}}
}
async function voteComm(id,type){
const key='v_c_'+id,old=localStorage.getItem(key);
if(old)return;
const doc=allComments.find(c=>c.$id===id),upd={};
upd[type]=(doc[type]||0)+1;
try{await db.updateDocument(AW_CONF.d,AW_CONF.cc,id,upd);localStorage.setItem(key,type);loadComments();}catch(e){}
}
function toggleCommSort(){sortDesc=!sortDesc;loadComments();}
function render(){
document.getElementById('m_cover').src=modData.cover_url;
document.getElementById('m_title').innerText=modData.title;
document.getElementById('m_date').innerText=formatDT(modData.$createdAt);
if(modData.updated_at&&modData.updated_at!==modData.$createdAt){document.getElementById('m_edit').innerText=formatDT(modData.updated_at);document.getElementById('edit_box').classList.remove('hidden');}
if(modData.mod_version)document.getElementById('m_ver').innerText=modData.mod_version;else document.getElementById('ver_box').classList.add('hidden');
if(modData.target_mc)document.getElementById('m_mc').innerText=modData.target_mc;else document.getElementById('mc_box').classList.add('hidden');
document.getElementById('m_type').innerText=modData.item_type;
document.getElementById('dlDomain').innerText=getDomain(modData.download_url);
document.getElementById('c_likes').innerText=(modData.likes||0).toLocaleString('ar-EG-u-nu-latn');
document.getElementById('c_dis').innerText=(modData.dislikes||0).toLocaleString('ar-EG-u-nu-latn');
document.getElementById('c_views').innerText=(modData.views||0).toLocaleString('ar-EG-u-nu-latn');
document.getElementById('c_dl').innerText=(modData.downloads||0).toLocaleString('ar-EG-u-nu-latn');
document.getElementById('m_long').innerHTML=modData.long_desc;
document.getElementById('dlAction').onclick=()=>{trackStat('download','v_dl_');window.location.href=modData.download_url;};
applyVoteStyles();
}
function getDomain(url){try{return new URL(url).hostname.replace('www.','');}catch(e){return 'رابط خارجي';}}
async function trackStat(t,p){const k=p+modId,l=localStorage.getItem(k),n=Date.now();if(l&&(n-l<86400000))return;const u={};u[t==='view'?'views':'downloads']=(modData[t==='view'?'views':'downloads']||0)+1;await db.updateDocument(AW_CONF.d,AW_CONF.c,modId,u);localStorage.setItem(k,n);}
async function handleVote(v){const k='v_vote_'+modId,o=localStorage.getItem(k);let u={likes:modData.likes,dislikes:modData.dislikes};if(o===v){u[v==='like'?'likes':'dislikes']--;localStorage.removeItem(k);}else{if(o)u[o==='like'?'likes':'dislikes']--;u[v==='like'?'likes':'dislikes']++;localStorage.setItem(k,v);}await db.updateDocument(AW_CONF.d,AW_CONF.c,modId,u);modData.likes=u.likes;modData.dislikes=u.dislikes;render();applyVoteStyles();}
function applyVoteStyles(){const v=localStorage.getItem('v_vote_'+modId);document.getElementById('btnLike').className='stat-btn'+(v==='like'?' active-like':'');document.getElementById('btnDis').className='stat-btn'+(v==='dislike'?' active-dislike':'');}
async function fetchUser(h){try{const res=await fetch(`https://api.jsonbin.io/v3/b/69a3f2b1d0ea881f40e41d45/latest`,{headers:{"X-Master-Key":"$2a$10$F5TR7pSKPRRNAeBzsdxQ4.NYog8xHGUi0hektkor0q/QWFVXzba3q"}});const user=(await res.json()).record.us.find(u=>"@"+u.username===h);if(user){document.getElementById('u_avatar').src=user.avatar;let vIcon='';if(user.vf==='true')vIcon='<i class="fas fa-check-circle verified-badge"></i>';else if(user.vf==='admin')vIcon='<span class="admin-badge"><i class="fas fa-certificate"></i><i class="fas fa-check"></i></span>';document.getElementById('u_name').innerHTML=`${user.full_name} ${vIcon}`;document.getElementById('publisherAction').onclick=()=>window.location.href=`../user/#${user.username}`;}}catch(e){}}
function copyPageLink(){navigator.clipboard.writeText(window.location.href).then(()=>{const t=document.getElementById('toast');t.style.display='block';setTimeout(()=>t.style.display='none',2000);});}
function sharePage(){if(navigator.share)navigator.share({url:window.location.href});}
window.onload=loadPage;
