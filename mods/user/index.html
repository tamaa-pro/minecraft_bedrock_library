<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>الملف الشخصي | Minecraft Library</title>
<link rel="icon" href="https://k.top4top.io/p_3715l1x3y1.jpg" type="image/png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg:#09090b;--card:#18181b;--border:#27272a;--accent:#3b82f6;--text:#fafafa;--text-sub:#a1a1aa;--success:#22c55e;--error:#ef4444;--input:#0c0c0e}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;margin:0;padding:0;overflow-x:hidden;line-height:1.4;-webkit-user-select:none;user-select:none}.hidden{display:none!important}#loadingScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px}#loadingScreen i{font-size:2rem;color:var(--accent);animation:fa-spin 2s linear infinite}#errorScreen{padding:50px 20px;text-align:center}#errorScreen i{font-size:3.5rem;color:var(--error);margin-bottom:15px}.profile-header{position:relative;margin-bottom:50px;background:#000;height:160px}.cover-img{width:100%;height:100%;object-fit:cover;display:block}.avatar-wrapper{position:absolute;bottom:-40px;right:15px;display:flex;align-items:flex-end;gap:12px}.avatar-img{width:90px;height:90px;border-radius:50%;border:3px solid var(--bg);background:#000;object-fit:cover}.user-meta-top h1{margin:0;font-size:1.1rem;display:flex;align-items:center;gap:5px}.verified-badge{color:var(--accent);font-size:0.9rem}.main-container{max-width:500px;margin:0 auto;padding:0 12px}.info-card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:12px;margin-bottom:12px}.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}.stat-box{background:var(--input);padding:8px;border-radius:10px;border:1px solid var(--border)}.stat-box label{display:block;font-size:0.6rem;color:var(--text-sub);margin-bottom:1px}.stat-box span{font-size:0.75rem;font-weight:600;color:var(--text)}.bio-box{background:rgba(255,255,255,0.03);padding:8px;border-radius:8px;font-size:0.75rem;color:var(--text-sub);margin-bottom:10px;border-right:3px solid var(--accent)}.social-btn{width:100%;padding:10px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-size:0.8rem}.social-btn:active{transform:scale(0.97)}.filter-bar{display:flex;gap:8px;margin-bottom:12px}.filter-btn{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:10px;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}.filter-btn:active{background:var(--accent);border-color:var(--accent)}.type-menu{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px;z-index:1000;display:grid;grid-template-columns:repeat(2,1fr);gap:10px;box-shadow:0 -10px 30px rgba(0,0,0,0.5);transform:translateY(100%);transition:0.3s}.type-menu.open{transform:translateY(0)}.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;display:none}.type-opt{background:var(--input);border:1px solid var(--border);padding:12px;border-radius:12px;text-align:center;font-size:0.85rem}.type-opt.active{background:var(--accent);color:#fff}.mod-card{background:var(--input);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}.mod-card-top{display:flex;gap:10px;padding:8px}.mod-thumb{width:80px;height:80px;border-radius:8px;object-fit:cover;background:#000}.mod-info{flex:1}.mod-info h4{margin:0 0 4px;font-size:0.85rem;display:flex;align-items:center;gap:4px}.badge{font-size:0.55rem;padding:2px 5px;border-radius:4px;background:var(--card);border:1px solid var(--border);color:var(--accent)}.mod-stats{display:flex;flex-wrap:wrap;gap:8px;font-size:0.6rem;color:var(--text-sub);margin-bottom:4px}.mod-dates{font-size:0.55rem;color:#666;display:flex;flex-direction:column}
</style>
</head>
<body>
<div id="loadingScreen"><i class="fas fa-spinner"></i><span>جاري تحميل بيانات الحساب</span></div>
<div id="overlay" class="menu-overlay" onclick="toggleMenu(false)"></div>
<div id="typeMenu" class="type-menu">
<div class="type-opt active" onclick="setType('all', this)">الكل</div>
<div class="type-opt" onclick="setType('mod', this)">Mods</div>
<div class="type-opt" onclick="setType('map', this)">Maps</div>
<div class="type-opt" onclick="setType('data_pack', this)">Data Packs</div>
<div class="type-opt" onclick="setType('texture_pack', this)">Texture</div>
<div class="type-opt" onclick="setType('shader', this)">Shaders</div>
</div>
<div id="errorScreen" class="hidden">
<i class="fas fa-exclamation-circle"></i>
<h2>Error Code 103</h2>
<p>لم يتم العثور على الحساب ، ربما قد ورد خطأ في اسم المستخدم في الرابط او ان الحساب قد تمت إزالته</p>
<button class="social-btn" style="width:auto;padding:10px 25px;margin:20px auto" onclick="window.location.href='https://tamaa-pro.github.io/minecraft_bedrock_library/mods/mc-list'">العودة للقائمة</button>
</div>
<div id="profileContent" class="hidden">
<div class="profile-header" id="headerBg">
<img id="u_cover" class="cover-img" onerror="this.style.display='none'">
<div class="avatar-wrapper">
<img id="u_avatar" class="avatar-img">
<div class="user-meta-top"><h1 id="u_full_name"></h1></div>
</div>
</div>
<div class="main-container">
<div class="info-card">
<div class="info-grid">
<div class="stat-box"><label>اسم المستخدم</label><span id="u_handle"></span></div>
<div class="stat-box"><label>تاريخ الانضمام</label><span id="u_date">--</span></div>
<div class="stat-box"><label>المنشورات</label><span id="u_count">0</span></div>
<div class="stat-box"><label>آخر نشاط</label><span id="u_last">--</span></div>
</div>
<div id="u_bio" class="bio-box hidden"></div>
<button id="u_social_btn" class="social-btn hidden"></button>
</div>
<div class="filter-bar">
<button class="filter-btn" onclick="toggleSort()"><i id="sortIcon" class="fas fa-sort-amount-down"></i> الترتيب</button>
<button class="filter-btn" onclick="toggleMenu(true)"><i class="fas fa-filter"></i> النوع</button>
<button class="filter-btn" onclick="window.location.href='https://tamaa-pro.github.io/minecraft_bedrock_library/mods/mc-list'"><i class="fas fa-list-ul"></i> القائمة العامة</button>
</div>
<div id="userModsList"></div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
<script>
const AW_CONF = { p: '69922bf4002571605f46', d: '69922c8e001dbb613d69', c: 'mods' };
const { Client, Databases, Query } = Appwrite;
const sdk = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject(AW_CONF.p);
const db = new Databases(sdk);
const userHandle = window.location.hash.substring(1);
let allMods = [], currentType = 'all', sortOrder = 'desc';

function formatDate(s) {
    if(!s) return '--';
    const d = new Date(s);
    return d.toLocaleDateString('ar-EG') + " | " + d.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
}

async function init() {
    if (!userHandle) return showErr();
    try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/69a3f2b1d0ea881f40e41d45/latest`, { headers: { "X-Master-Key": "$2a$10$F5TR7pSKPRRNAeBzsdxQ4.NYog8xHGUi0hektkor0q/QWFVXzba3q" } });
        const user = (await res.json()).record.us.find(u => u.username === userHandle);
        if (!user) return showErr();
        renderProfile(user);
        await fetchUserMods(user.username);
    } catch (e) { showErr(); }
    finally { document.getElementById('loadingScreen').classList.add('hidden'); }
}

function renderProfile(u) {
    document.getElementById('profileContent').classList.remove('hidden');
    if (u.cover) document.getElementById('u_cover').src = u.cover;
    document.getElementById('u_avatar').src = u.avatar;
    document.getElementById('u_full_name').innerHTML = `${u.full_name} ${u.vf === 'true' ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}`;
    document.getElementById('u_handle').innerText = '@' + u.username;
    document.getElementById('u_date').innerText = u.createdat || '--';
    if (u.bio) {
        const b = document.getElementById('u_bio');
        b.innerText = u.bio;
        b.classList.remove('hidden');
    }
    if (u.social) setupSocialBtn(u.social);
}

function setupSocialBtn(url) {
    const btn = document.getElementById('u_social_btn');
    btn.classList.remove('hidden');
    let icon = 'fa-earth-americas', text = 'فتح رابط خارجي';
    const l = url.toLowerCase();
    if (l.includes('youtube.com') || l.includes('youtu.be')) { icon = 'fa-youtube'; text = 'فتح قناة يوتيوب'; }
    else if (l.includes('facebook.com')) { icon = 'fa-facebook'; text = 'فتح صفحة فيسبوك'; }
    else if (l.includes('t.me')) { icon = 'fa-telegram'; text = 'فتح قناة تلجرام'; }
    else if (l.includes('wa.me') || l.includes('whatsapp.com')) { icon = 'fa-whatsapp'; text = 'فتح رابط واتساب'; }
    else if (l.includes('twitter.com') || l.includes('x.com')) { icon = 'fa-x-twitter'; text = 'فتح حساب X'; }
    btn.innerHTML = `<i class="fab ${icon.includes('fa-earth') ? 'fas' : 'fab'} ${icon}"></i> ${text}`;
    btn.onclick = () => window.location.href = url;
}

async function fetchUserMods(username) {
    try {
        const res = await db.listDocuments(AW_CONF.d, AW_CONF.c, [Query.equal('author_handle', '@' + username), Query.limit(20)]);
        allMods = res.documents;
        document.getElementById('u_count').innerText = res.total;
        if (allMods.length > 0) {
            const latest = [...allMods].sort((a,b) => new Date(b.$createdAt) - new Date(a.$createdAt))[0];
            document.getElementById('u_last').innerText = formatDate(latest.updated_at || latest.$createdAt);
        }
        renderMods();
    } catch (e) { }
}

function renderMods() {
    const list = document.getElementById('userModsList');
    let filtered = allMods.filter(m => currentType === 'all' || m.item_type === currentType);
    filtered.sort((a, b) => {
        const da = new Date(a.$createdAt), db = new Date(b.$createdAt);
        return sortOrder === 'desc' ? db - da : da - db;
    });
    if (filtered.length === 0) { list.innerHTML = '<p style="text-align:center;padding:30px;font-size:0.8rem;color:var(--text-sub)">لا توجد نتائج</p>'; return; }
    list.innerHTML = filtered.map(m => `
<div class="mod-card" onclick="window.location.href='https://tamaa-pro.github.io/minecraft_bedrock_library/mods/download#${m.$id}'">
    <div class="mod-card-top">
        <img src="${m.cover_url}" class="mod-thumb" onerror="this.src='https://placehold.co/80'">
        <div class="mod-info">
            <h4>${m.title} ${m.mod_version ? `<span class="badge">${m.mod_version}</span>` : ''}</h4>
            <div class="mod-stats">
                <span><i class="fas fa-eye"></i> ${m.views || 0}</span>
                <span><i class="fas fa-thumbs-up"></i> ${m.likes || 0}</span>
                <span><i class="fas fa-thumbs-down"></i> ${m.dislikes || 0}</span>
                <span><i class="fas fa-download"></i> ${m.downloads || 0}</span>
            </div>
            <div class="mod-dates">
                <span>نشر: ${formatDate(m.$createdAt)}</span>
                ${m.updated_at ? `<span>تعديل: ${formatDate(m.updated_at)}</span>` : ''}
            </div>
        </div>
    </div>
</div>`).join('');
}

function toggleMenu(show) {
    document.getElementById('typeMenu').classList.toggle('open', show);
    document.getElementById('overlay').style.display = show ? 'block' : 'none';
}

function setType(type, el) {
    currentType = type;
    document.querySelectorAll('.type-opt').forEach(opt => opt.classList.remove('active'));
    el.classList.add('active');
    renderMods();
    toggleMenu(false);
}

function toggleSort() {
    sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
    document.getElementById('sortIcon').className = sortOrder === 'desc' ? 'fas fa-sort-amount-down' : 'fas fa-sort-amount-up';
    renderMods();
}

function showErr() {
    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('errorScreen').classList.remove('hidden');
}

window.onload = init;
</script>
<style>
img{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-user-drag:none}
</style>
<script>
document.addEventListener('contextmenu', function(e) {
if (e.target.tagName === 'IMG') e.preventDefault();
}, false);
document.addEventListener('dragstart', function(e) {
if (e.target.tagName === 'IMG') e.preventDefault();
}, false);
</script>
</body>
</html>
