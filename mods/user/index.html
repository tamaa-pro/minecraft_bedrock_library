<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>حساب المستخدم | Minecraft Library</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg:#09090b;--card:#18181b;--border:#27272a;--accent:#3b82f6;--text:#fafafa;--text-sub:#a1a1aa;--verify:#38bdf8}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;margin:0;padding:0;overflow-x:hidden;line-height:1.6;-webkit-user-select:none;user-select:none}.hidden{display:none!important}#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity 0.3s}.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.main-container{max-width:800px;margin:0 auto;padding-bottom:40px}.header-area{position:relative;margin-bottom:60px;width:100%}.cover-img{width:100%;height:200px;object-fit:cover;background:#000;display:block}.avatar-img{width:110px;height:110px;border-radius:50%;object-fit:cover;border:6px solid var(--bg);background:#000;position:absolute;bottom:-55px;left:50%;transform:translateX(-50%);z-index:5}.user-title-area{text-align:center;margin-top:10px;padding:0 15px}.user-name{font-size:1.4rem;margin:0;display:flex;align-items:center;justify-content:center;gap:6px}.verified-badge{color:var(--verify);font-size:1.1rem}.user-handle{color:var(--text-sub);font-size:0.9rem;margin:2px 0 15px}.card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:15px;margin:0 15px 15px}.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:15px;font-size:0.85rem}.stat-box{background:var(--bg);padding:10px;border-radius:10px;border:1px solid var(--border);text-align:center}.stat-val{display:block;font-weight:700;color:var(--accent);font-size:1rem;margin-bottom:2px}.stat-lbl{color:var(--text-sub);font-size:0.75rem}.bio-box{background:var(--bg);border:1px solid var(--border);padding:12px;border-radius:10px;font-size:0.85rem;color:var(--text);text-align:center;margin-bottom:15px}.social-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:none;border-radius:10px;background:var(--bg);color:var(--text);border:1px solid var(--border);font-family:inherit;font-size:0.9rem;font-weight:600;cursor:pointer;text-decoration:none}.social-btn:active{transform:scale(0.98)}.filter-scroll{display:flex;overflow-x:auto;gap:8px;padding-bottom:5px;scrollbar-width:none}.filter-scroll::-webkit-scrollbar{display:none}.filter-btn{background:var(--bg);border:1px solid var(--border);color:var(--text-sub);padding:8px 16px;border-radius:20px;white-space:nowrap;font-size:0.85rem;cursor:pointer}.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}.mods-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:0 15px}.mod-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column}.mod-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;background:#000;border-bottom:1px solid var(--border)}.mod-content{padding:10px;flex:1;display:flex;flex-direction:column}.mod-title{margin:0 0 6px;font-size:0.9rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.mod-badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}.badge{font-size:0.6rem;padding:2px 6px;border-radius:4px;background:var(--bg);border:1px solid var(--border);color:var(--accent)}.mod-metrics{display:flex;justify-content:space-between;font-size:0.7rem;color:var(--text-sub);margin-top:auto}.metrics-group{display:flex;gap:8px}.load-more{width:calc(100% - 30px);margin:15px auto;display:block;padding:12px;background:var(--card);border:1px solid var(--border);color:var(--accent);border-radius:10px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div id="loader"><div class="spinner"></div></div>

<div class="main-container hidden" id="mainContent">
<div class="header-area">
<img id="uCover" class="cover-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
<img id="uAvatar" class="avatar-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
</div>

<div class="user-title-area">
<h1 class="user-name" id="uName">... <i id="uBadge" class="fas fa-check-circle verified-badge hidden"></i></h1>
<div class="user-handle" id="uHandle">@...</div>
</div>

<div class="card">
<div class="stats-grid">
<div class="stat-box"><span class="stat-val" id="sTotal">0</span><span class="stat-lbl">المنشورات</span></div>
<div class="stat-box"><span class="stat-val" id="sLast">--</span><span class="stat-lbl">آخر نشاط</span></div>
<div class="stat-box"><span class="stat-val" id="sJoined">--</span><span class="stat-lbl">تاريخ الانضمام</span></div>
<div class="stat-box"><span class="stat-val" id="sViews">0</span><span class="stat-lbl">إجمالي المشاهدات</span></div>
</div>
<div class="bio-box" id="uBio">لا يوجد وصف متاح.</div>
<a id="uSocial" class="social-btn hidden" target="_blank">
<i id="socialIcon" class="fas fa-globe"></i> <span id="socialText">فتح الرابط</span>
</a>
</div>

<div class="card" style="padding:10px 15px">
<div class="filter-scroll" id="filterOpts">
<button class="filter-btn active" data-type="all">الكل</button>
<button class="filter-btn" data-type="mod">Mods</button>
<button class="filter-btn" data-type="map">Maps</button>
<button class="filter-btn" data-type="data_pack">Data Packs</button>
<button class="filter-btn" data-type="texture_pack">Texture</button>
</div>
</div>

<div class="mods-grid" id="modsContainer"></div>
<button id="loadMoreBtn" class="load-more hidden" onclick="loadUserMods()">عرض المزيد</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
<script>
const JB_KEY = "$2a$10$F5TR7pSKPRRNAeBzsdxQ4.NYog8xHGUi0hektkor0q/QWFVXzba3q";
const JB_ID = "69a3f2b1d0ea881f40e41d45";
const AW_CONF = { p: '69922bf4002571605f46', d: '69922c8e001dbb613d69', c: 'mods' };
const { Client, Databases, Query } = Appwrite;
const sdk = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject(AW_CONF.p);
const db = new Databases(sdk);

let targetUser = window.location.hash.substring(1);
let currentFilter = 'all';
let offset = 0;
const limit = 20;
let isFetching = false;
let totalViews = 0;

function getSocialInfo(url) {
    if(!url) return null;
    let u = url.toLowerCase();
    if(u.includes('facebook.com')) return {i: 'fa-facebook', t: 'فتح رابط فيسبوك'};
    if(u.includes('youtube.com') || u.includes('youtu.be')) return {i: 'fa-youtube', t: 'فتح رابط يوتيوب'};
    if(u.includes('wa.me') || u.includes('whatsapp.com')) return {i: 'fa-whatsapp', t: 'فتح رابط واتساب'};
    if(u.includes('t.me') || u.includes('telegram.org')) return {i: 'fa-telegram', t: 'فتح رابط تلجرام'};
    if(u.includes('twitter.com') || u.includes('x.com')) return {i: 'fa-twitter', t: 'فتح رابط تويتر'};
    return {i: 'fa-globe', t: 'فتح رابط ويب'};
}

async function initProfile() {
    if(!targetUser) return showError();
    try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${JB_ID}/latest`, { headers: {"X-Master-Key": JB_KEY} });
        const bin = (await res.json()).record;
        const user = bin.us.find(u => u.username === targetUser);
        if(!user) return showError();
        
        if(user.cover) document.getElementById('uCover').src = user.cover;
        if(user.avatar) document.getElementById('uAvatar').src = user.avatar;
        document.getElementById('uName').innerText = user.full_name;
        if(user.vf === "true") document.getElementById('uBadge').classList.remove('hidden');
        document.getElementById('uHandle').innerText = "@" + user.username;
        if(user.bio) document.getElementById('uBio').innerText = user.bio;
        if(user.createdat) document.getElementById('sJoined').innerText = user.createdat;
        
        if(user.social) {
            const sBtn = document.getElementById('uSocial');
            const sInfo = getSocialInfo(user.social);
            sBtn.href = user.social;
            document.getElementById('socialIcon').className = `fab ${sInfo.i}`;
            document.getElementById('socialText').innerText = sInfo.t;
            sBtn.classList.remove('hidden');
        }
        
        await loadUserMods(true);
        
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
        }, 300);
        
    } catch(e) { showError(); }
}

async function loadUserMods(reset = false) {
    if(isFetching) return;
    isFetching = true;
    if(reset) { offset = 0; document.getElementById('modsContainer').innerHTML = ''; totalViews = 0; }
    
    try {
        let q = [
            Query.equal('author_handle', '@'+targetUser),
            Query.orderDesc('$createdAt'),
            Query.limit(limit),
            Query.offset(offset)
        ];
        if(currentFilter !== 'all') q.push(Query.equal('item_type', currentFilter));
        
        const res = await db.listDocuments(AW_CONF.d, AW_CONF.c, q);
        
        if(reset && currentFilter === 'all') {
            document.getElementById('sTotal').innerText = res.total;
            if(res.documents.length > 0) {
                const lastD = new Date(res.documents[0].$createdAt);
                document.getElementById('sLast').innerText = `${lastD.getFullYear()}/${lastD.getMonth()+1}/${lastD.getDate()}`;
            }
        }
        
        let html = '';
        res.documents.forEach(m => {
            totalViews += (m.views || 0);
            html += `
            <a href="https://tamaa-pro.github.io/minecraft_bedrock_library/mods/download#${m.$id}" class="mod-card">
                <img src="${m.cover_url}" class="mod-thumb" loading="lazy">
                <div class="mod-content">
                    <h3 class="mod-title">${m.title}</h3>
                    <div class="mod-badges">
                        <span class="badge">${m.item_type}</span>
                        ${m.mod_version ? `<span class="badge">${m.mod_version}</span>` : ''}
                    </div>
                    <div class="mod-metrics">
                        <div class="metrics-group">
                            <span><i class="fas fa-eye"></i> ${m.views||0}</span>
                            <span><i class="fas fa-download"></i> ${m.downloads||0}</span>
                        </div>
                        <div class="metrics-group">
                            <span style="color:var(--accent)"><i class="fas fa-thumbs-up"></i> ${m.likes||0}</span>
                        </div>
                    </div>
                </div>
            </a>`;
        });
        
        document.getElementById('modsContainer').insertAdjacentHTML('beforeend', html);
        
        if(currentFilter === 'all' && reset) {
            document.getElementById('sViews').innerText = totalViews;
        }
        
        offset += limit;
        document.getElementById('loadMoreBtn').classList.toggle('hidden', res.documents.length < limit);
        
    } catch(e) { console.error(e); }
    isFetching = false;
}

function showError() {
    document.getElementById('loader').innerHTML = '<h2 style="color:var(--error)">المستخدم غير موجود أو حدث خطأ</h2>';
}

document.getElementById('filterOpts').addEventListener('click', (e) => {
    if(e.target.classList.contains('filter-btn')) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter = e.target.getAttribute('data-type');
        loadUserMods(true);
    }
});

window.onload = initProfile;
</script>
</body>
</html>
