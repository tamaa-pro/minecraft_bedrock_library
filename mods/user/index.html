<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>الملف الشخصي | Minecraft Library</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg:#09090b;--card:#18181b;--border:#27272a;--accent:#3b82f6;--text:#fafafa;--text-sub:#a1a1aa;--success:#22c55e;--error:#ef4444;--input:#0c0c0e}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;margin:0;padding:0;overflow-x:hidden;line-height:1.6;-webkit-user-select:none;user-select:none}.hidden{display:none!important}#loadingScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px}#loadingScreen i{font-size:2.5rem;color:var(--accent);animation:fa-spin 2s linear infinite}#errorScreen{padding:40px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh}#errorScreen i{font-size:4rem;color:var(--error);margin-bottom:15px}.profile-header{position:relative;margin-bottom:55px}.cover-container{width:100%;height:160px;background:#000;border-bottom:1px solid var(--border);position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}.cover-img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;z-index:1}.welcome-msg{position:relative;z-index:2;color:var(--accent);font-weight:700;font-size:0.9rem;white-space:nowrap;overflow:hidden;border-left:3px solid var(--accent);padding-left:5px;width:0;opacity:0}.animate-text{animation:typing 2s steps(30,end) forwards,blink .5s step-end infinite,fadeOut 1s forwards 4s}.avatar-wrapper{position:absolute;bottom:-40px;right:20px;z-index:5;display:flex;align-items:flex-end;gap:12px}.avatar-img{width:90px;height:90px;border-radius:50%;border:4px solid var(--bg);background:#000;object-fit:cover}.user-meta-top h1{margin:0;font-size:1.2rem;display:flex;align-items:center;gap:6px}.verified-badge{color:var(--accent);font-size:1rem}.main-container{max-width:650px;margin:0 auto;padding:0 12px}.info-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:12px;margin-bottom:12px}.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}.stat-box{background:var(--input);padding:8px 12px;border-radius:12px;border:1px solid var(--border)}.stat-box label{display:block;font-size:0.6rem;color:var(--text-sub);margin-bottom:2px}.stat-box span{font-size:0.75rem;font-weight:600;color:var(--text)}.bio-box{background:rgba(255,255,255,0.03);padding:10px;border-radius:10px;font-size:0.8rem;color:var(--text-sub);margin-bottom:10px;border-right:3px solid var(--accent)}.social-btn{width:100%;padding:10px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:700;font-size:0.85rem;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}.social-btn:active{transform:scale(0.97)}.filter-bar{display:flex;gap:6px;margin-bottom:12px;position:relative}.f-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:10px;flex:1;font-size:0.8rem;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer}.f-btn:active{background:var(--accent)}.type-menu{position:absolute;bottom:110%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:15px;padding:10px;z-index:100;display:grid;grid-template-columns:1fr 1fr;gap:6px;box-shadow:0 -10px 25px rgba(0,0,0,0.5)}.type-item{padding:8px;background:var(--input);border:1px solid var(--border);border-radius:8px;text-align:center;font-size:0.75rem}.type-item.active{border-color:var(--accent);color:var(--accent)}.mod-card{background:var(--input);border:1px solid var(--border);border-radius:15px;margin-bottom:10px;overflow:hidden}.mod-card-main{display:flex;gap:10px;padding:10px}.mod-thumb{width:85px;height:85px;border-radius:10px;object-fit:cover;background:#000}.mod-info{flex:1}.mod-info h4{margin:0 0 5px;font-size:0.9rem;display:flex;align-items:center;gap:5px}.badge{font-size:0.6rem;padding:2px 5px;border-radius:4px;background:var(--card);border:1px solid var(--border);color:var(--accent)}.mod-stats{display:flex;flex-wrap:wrap;gap:8px;font-size:0.65rem;color:var(--text-sub);margin-bottom:5px}.mod-dates{font-size:0.6rem;color:#666;display:flex;flex-direction:column;gap:1px}@keyframes typing{from{width:0;opacity:1}to{width:70%;opacity:1}}@keyframes blink{from,to{border-color:transparent}50%{border-color:var(--accent)}}@keyframes fadeOut{to{opacity:0;visibility:hidden}}
</style>
</head>
<body>
<div id="loadingScreen"><i class="fas fa-circle-notch"></i><span>جاري تحميل بيانات الحساب</span></div>
<div id="errorScreen" class="hidden"><i class="fas fa-user-slash"></i><h2>Error Code 103</h2><p>لم يتم العثور على الحساب ، ربما قد ورد خطأ في اسم المستخدم في الرابط او ان الحساب قد تمت إزالته</p><button class="social-btn" style="width:auto;padding:10px 30px;margin-top:20px" onclick="window.location.href='mc-list'">العودة للقائمة</button></div>
<div id="profileContent" class="hidden">
<div class="profile-header">
<div class="cover-container">
<img id="u_cover" class="cover-img hidden">
<div id="welcomeNote" class="welcome-msg"></div>
</div>
<div class="avatar-wrapper">
<img id="u_avatar" class="avatar-img">
<div class="user-meta-top"><h1 id="u_full_name"></h1></div>
</div>
</div>
<div class="main-container">
<div class="info-card">
<div class="info-grid">
<div class="stat-box"><label>اسم المستخدم</label><span id="u_handle"></span></div>
<div class="stat-box"><label>تاريخ الانضمام</label><span id="u_date"></span></div>
<div class="stat-box"><label>المنشورات</label><span id="u_count">0</span></div>
<div class="stat-box"><label>آخر ظهور (منشور)</label><span id="u_last">---</span></div>
</div>
<div id="u_bio" class="bio-box hidden"></div>
<button id="u_social_btn" class="social-btn hidden"></button>
</div>
<div class="filter-bar">
<button class="f-btn" onclick="toggleTypeMenu()"><i class="fas fa-filter"></i> <span id="activeTypeName">الكل</span></button>
<button class="f-btn" onclick="toggleSort()"><i id="sortIcon" class="fas fa-sort-amount-down"></i> الترتيب</button>
<button class="f-btn" onclick="window.location.href='mc-list'"><i class="fas fa-th-list"></i> القائمة العامة</button>
<div id="typeMenu" class="type-menu hidden">
<div class="type-item active" onclick="setType('all', 'الكل')">الكل</div>
<div class="type-item" onclick="setType('mod', 'Mods')">Mods</div>
<div class="type-item" onclick="setType('map', 'Maps')">Maps</div>
<div class="type-item" onclick="setType('data_pack', 'Data Packs')">Data</div>
<div class="type-item" onclick="setType('texture_pack', 'Texture')">Texture</div>
<div class="type-item" onclick="setType('shader', 'Shaders')">Shaders</div>
</div>
</div>
<div id="userModsList"></div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
<script>
const AW_CONF={p:'69922bf4002571605f46',d:'69922c8e001dbb613d69',c:'mods'};
const {Client,Databases,Query}=Appwrite;
const sdk=new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject(AW_CONF.p);
const db=new Databases(sdk);
const userHandle=window.location.hash.substring(1);
let allMods=[], currentType='all', sortOrder='desc';

function formatDT(s){return new Date(s).toLocaleString('ar-EG',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}

async function init(){
if(!userHandle) return showErr();
try{
const res=await fetch(`https://api.jsonbin.io/v3/b/69a3f2b1d0ea881f40e41d45/latest`,{headers:{"X-Master-Key":"$2a$10$F5TR7pSKPRRNAeBzsdxQ4.NYog8xHGUi0hektkor0q/QWFVXzba3q"}});
const user=(await res.json()).record.us.find(u=>u.username===userHandle);
if(!user) return showErr();
renderProfile(user);
await fetchUserMods(user.username);
}catch(e){showErr();}
finally{document.getElementById('loadingScreen').classList.add('hidden');}
}

function renderProfile(u){
document.getElementById('profileContent').classList.remove('hidden');
const cv=document.getElementById('u_cover');
if(u.cover){cv.src=u.cover; cv.classList.remove('hidden');}
setTimeout(()=>{
const note=document.getElementById('welcomeNote');
note.innerText=`أهلاً بك في حساب ${u.full_name}`;
note.classList.add('animate-text');
},2000);
document.getElementById('u_avatar').src=u.avatar;
document.getElementById('u_full_name').innerHTML=`${u.full_name} ${u.vf==='true'?'<i class="fas fa-check-circle verified-badge"></i>':''}`;
document.getElementById('u_handle').innerText='@'+u.username;
document.getElementById('u_date').innerText=u.createdat || '---';
if(u.bio){ const b=document.getElementById('u_bio'); b.innerText=u.bio; b.classList.remove('hidden'); }
if(u.social) setupSocialBtn(u.social);
}

function setupSocialBtn(url){
const btn=document.getElementById('u_social_btn');
btn.classList.remove('hidden');
let icon='fa-globe', text='فتح الموقع الرسمي';
const l=url.toLowerCase();
if(l.includes('youtube.com')||l.includes('youtu.be')){icon='fa-youtube'; text=l.includes('/channel/')||l.includes('/c/')?'فتح قناة يوتيوب':'فتح فيديو يوتيوب';}
else if(l.includes('facebook.com')||l.includes('fb.watch')){icon='fa-facebook'; text=l.includes('/groups/')?'فتح مجموعة فيسبوك':'فتح صفحة فيسبوك';}
else if(l.includes('t.me')){icon='fa-telegram'; text=l.includes('/+')||l.includes('joinchat')?'انضمام لمجموعة تلجرام':'فتح قناة تلجرام';}
else if(l.includes('wa.me')||l.includes('whatsapp.com')){icon='fa-whatsapp'; text=l.includes('chat')?'انضمام لمجتمع واتساب':'تواصل عبر واتساب';}
else if(l.includes('twitter.com')||l.includes('x.com')){icon='fa-x-twitter'; text='فتح حساب X (تويتر)';}
btn.innerHTML=`<i class="fab ${icon}"></i> ${text}`;
btn.onclick=()=>window.location.href=url;
}

async function fetchUserMods(username){
try{
const res=await db.listDocuments(AW_CONF.d,AW_CONF.c,[Query.equal('author_handle','@'+username),Query.limit(20)]);
allMods=res.documents;
document.getElementById('u_count').innerText=res.total;
if(allMods.length>0) document.getElementById('u_last').innerText=formatDT(allMods[0].$createdAt);
renderMods();
}catch(e){}
}

function renderMods(){
const list=document.getElementById('userModsList');
let filtered=allMods.filter(m=>currentType==='all' || m.item_type===currentType);
filtered.sort((a,b)=>sortOrder==='desc'?new Date(b.$createdAt)-new Date(a.$createdAt):new Date(a.$createdAt)-new Date(b.$createdAt));
if(filtered.length===0){list.innerHTML='<p style="text-align:center;padding:20px;color:var(--text-sub);font-size:0.8rem">لا يوجد منشورات هنا</p>'; return;}
list.innerHTML=filtered.map(m=>`
<div class="mod-card" onclick="window.location.href='download#${m.$id}'">
<div class="mod-card-main">
<img src="${m.cover_url}" class="mod-thumb" onerror="this.src='https://placehold.co/85'">
<div class="mod-info">
<h4>${m.title} ${m.mod_version?`<span class="badge">${m.mod_version}</span>`:''} <span class="badge">${m.item_type}</span></h4>
<div class="mod-stats">
<span><i class="fas fa-eye"></i> ${m.views||0}</span>
<span><i class="fas fa-thumbs-up"></i> ${m.likes||0}</span>
<span><i class="fas fa-thumbs-down"></i> ${m.dislikes||0}</span>
<span><i class="fas fa-download"></i> ${m.downloads||0}</span>
</div>
<div class="mod-dates">
<span>نشر: ${formatDT(m.$createdAt)}</span>
${m.updated_at && m.updated_at !== m.$createdAt?`<span>تعديل: ${formatDT(m.updated_at)}</span>`:''}
</div>
</div>
</div>
</div>`).join('');
}

function toggleTypeMenu(){ document.getElementById('typeMenu').classList.toggle('hidden'); }
function setType(t, n){ currentType=t; document.getElementById('activeTypeName').innerText=n; toggleTypeMenu(); renderMods(); }
function toggleSort(){ sortOrder=sortOrder==='desc'?'asc':'desc'; document.getElementById('sortIcon').className=sortOrder==='desc'?'fas fa-sort-amount-down':'fas fa-sort-amount-up'; renderMods(); }
function showErr(){ document.getElementById('loadingScreen').classList.add('hidden'); document.getElementById('errorScreen').classList.remove('hidden'); }
window.onload=init;
</script>
</body>
</html>
