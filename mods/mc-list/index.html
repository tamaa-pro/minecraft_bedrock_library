<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>قائمة المودات و المابات</title>
<link rel="icon" href="https://k.top4top.io/p_3715l1x3y1.jpg" type="image/png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg:#09090b;--card:#18181b;--border:#27272a;--accent:#3b82f6;--text:#fafafa;--text-sub:#a1a1aa;--input:#0c0c0e}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;margin:0;padding:0;overflow-x:hidden;line-height:1.6;-webkit-user-select:none;user-select:none}input,select{-webkit-user-select:text!important;user-select:text!important}.hidden{display:none!important}.header-tools{background:var(--card);border-bottom:1px solid var(--border);padding:8px;position:sticky;top:0;z-index:1000;display:flex;gap:6px;align-items:center;height:55px}.tool-btn{background:var(--input);border:1px solid var(--border);color:var(--text);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-size:0.7rem;flex:1;height:40px;white-space:nowrap;transition:0.2s}.tool-btn:active{transform:scale(0.95);background:#222}.tool-btn.active{border-color:var(--accent);color:var(--accent)}.search-box{display:none;flex:1;gap:5px;align-items:center}.search-box input{flex:1;background:var(--input);border:1px solid var(--border);color:#fff;padding:0 12px;border-radius:10px;height:40px;font-size:0.8rem;outline:none;min-width:0}.header-tools.search-active > .tool-btn,.header-tools.search-active > .dropdown{display:none}.header-tools.search-active .search-box{display:flex}.dropdown{position:relative;flex:1}.dropdown-menu{position:absolute;top:50px;right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;width:150px;box-shadow:0 10px 25px rgba(0,0,0,0.5);z-index:1100;overflow:hidden}.dropdown-item{padding:12px;font-size:0.8rem;cursor:pointer;border-bottom:1px solid var(--border);text-align:right}.dropdown-item:last-child{border-bottom:none}.dropdown-item:hover{background:rgba(255,255,255,0.05)}.main-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:12px;max-width:1400px;margin:0 auto}.mod-card{background:var(--card);border:1px solid var(--border);border-radius:15px;overflow:hidden;display:flex;flex-direction:column}.img-container{width:100%;position:relative;background:#000}.mod-img{width:100%;height:auto;display:block}.mod-title-badge{position:absolute;bottom:8px;right:8px;background:rgba(24,24,27,0.85);backdrop-filter:blur(4px);padding:4px 8px;border-radius:6px;font-size:10px;color:#fff;border:1px solid rgba(255,255,255,0.1);max-width:90%;overflow:hidden;text-overflow:ellipsis}.stats-bar{padding:8px;background:rgba(255,255,255,0.01);display:flex;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--border);align-items:center}.stat-item{font-size:0.65rem;color:var(--text-sub);display:flex;align-items:center;gap:3px}.stat-item i{color:var(--accent);font-size:0.7rem}.date-badge{background:rgba(255,255,255,0.05);padding:3px 8px;border-radius:6px;border:1px solid rgba(255,255,255,0.05)}.short-desc{padding:10px 12px;font-size:0.75rem;color:var(--text-sub);line-height:1.4;flex-grow:1;background:rgba(255,255,255,0.02)}.action-bar{padding:8px;display:grid;grid-template-columns:1fr 40px 40px;gap:6px;border-top:1px solid var(--border)}.action-btn{background:var(--input);border:1px solid var(--border);color:#fff;padding:8px;border-radius:8px;font-size:0.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center}.action-btn:active{transform:scale(0.95)}.action-btn.saved{color:#f59e0b;border-color:#f59e0b}.pagination{display:flex;justify-content:center;gap:8px;padding:20px;margin-bottom:30px}.page-btn{background:var(--card);border:1px solid var(--border);color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.8rem}.page-btn.active{border-color:var(--accent)}
</style>
</head>
<body>
<div class="header-tools" id="headerTools">
<button class="tool-btn" onclick="toggleSearch(true)"><i class="fas fa-search"></i></button>
<div class="dropdown">
<button class="tool-btn" style="width:100%" onclick="toggleDrop()"><span id="typeText">عرض الكل</span></button>
<div id="typeMenu" class="dropdown-menu hidden">
<div class="dropdown-item" onclick="updateType('all','عرض الكل')">عرض الكل</div>
<div class="dropdown-item" onclick="updateType('mod','Mods')">Mods</div>
<div class="dropdown-item" onclick="updateType('map','Maps')">Maps</div>
<div class="dropdown-item" onclick="updateType('texture_pack','Texture')">Texture Pack</div>
<div class="dropdown-item" onclick="updateType('data_pack','Data')">Data Pack</div>
</div>
</div>
<button class="tool-btn" onclick="toggleSort()"><i id="sortIcon" class="fas fa-sort-amount-down"></i> <span id="sortText">الأحدث</span></button>
<button class="tool-btn" id="savedModeBtn" onclick="toggleSavedMode()"><i class="fas fa-bookmark"></i></button>
<button class="tool-btn" onclick="window.location.href='https://tamaa-pro.github.io/minecraft_bedrock_library/mods/upload'"><i class="fas fa-plus"></i></button>
<div class="search-box">
<input type="text" id="searchInput" placeholder="ابحث في قاعدة البيانات...">
<button class="tool-btn" style="flex:none;width:40px" onclick="fetchMods()"><i class="fas fa-search"></i></button>
<button class="tool-btn" style="flex:none;width:40px" onclick="toggleSearch(false)"><i class="fas fa-times"></i></button>
</div>
</div>
<div id="modGrid" class="main-grid"></div>
<div id="paginationBar" class="pagination hidden"></div>
<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
<script>
const AW_CONF={p:'69922bf4002571605f46',d:'69922c8e001dbb613d69',c:'mods'};
const DOWNLOAD_URL='https://tamaa-pro.github.io/minecraft_bedrock_library/mods/download';
const USER_URL='https://tamaa-pro.github.io/minecraft_bedrock_library/mods/user';
const {Client,Databases,Query}=Appwrite;
const sdk=new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject(AW_CONF.p);
const db=new Databases(sdk);
let currentPage=0, itemsPerPage=24, currentSort='desc', currentType='all', savedMode=false;
let allSavedIds=JSON.parse(localStorage.getItem('lib_saved')||'[]');

async function fetchMods(){
const grid=document.getElementById('modGrid');
grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:50px;color:var(--text-sub)">جاري جلب البيانات...</div>';
let q=[Query.limit(itemsPerPage),Query.offset(currentPage*itemsPerPage),currentSort==='desc'?Query.orderDesc('$createdAt'):Query.orderAsc('$createdAt')];
const sVal=document.getElementById('searchInput').value;
if(sVal){q.push(Query.search('title',sVal));savedMode=false;document.getElementById('savedModeBtn').classList.remove('active');}
if(currentType!=='all')q.push(Query.equal('item_type',currentType));
if(savedMode){if(allSavedIds.length===0){grid.innerHTML='<p style="grid-column:1/-1;text-align:center">لا يوجد محفوظات</p>';return;}q.push(Query.equal('$id',allSavedIds));}
try{
const res=await db.listDocuments(AW_CONF.d,AW_CONF.c,q);
renderMods(res.documents,'modGrid');
renderPagination(res.total);
}catch(e){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--error)">حدث خطأ</div>';}
}

function renderMods(mods,containerId){
const container=document.getElementById(containerId);
if(mods.length===0){container.innerHTML='<p style="grid-column:1/-1;text-align:center">لا توجد نتائج</p>';return;}
container.innerHTML=mods.map(m=>{
const isS=allSavedIds.includes(m.$id);
const dateStr=new Date(m.$createdAt).toLocaleDateString('en-GB');
return `<div class="mod-card">
<div class="img-container"><img src="${m.cover_url}" class="mod-img" onerror="this.src='https://placehold.co/400x200?text=No+Image'"><div class="mod-title-badge">${m.title}${m.mod_version?' v'+m.mod_version:''}</div></div>
<div class="stats-bar">
<div class="stat-item"><i class="fas fa-thumbs-up"></i> ${m.likes||0}</div>
<div class="stat-item"><i class="fas fa-thumbs-down"></i> ${m.dislikes||0}</div>
<div class="stat-item"><i class="fas fa-eye"></i> ${m.views||0}</div>
<div class="stat-item"><i class="fas fa-download"></i> ${m.downloads||0}</div>
<div class="stat-item date-badge"><i class="fas fa-calendar-alt"></i> ${dateStr}</div>
<div class="stat-item" onclick="window.location.href='${USER_URL}#${m.author_handle.replace('@','')}'" style="cursor:pointer;color:var(--accent)"><i class="fas fa-user-circle"></i> ${m.author_handle}</div>
</div>
<div class="short-desc">${m.short_desc || 'لا يوجد وصف.'}</div>
<div class="action-bar">
<button class="action-btn" onclick="openMod('${m.$id}')"><i class="fas fa-external-link-alt"></i> فتح</button>
<button class="action-btn ${isS?'saved':''}" id="save-main-${m.$id}" onclick="toggleSave('${m.$id}')"><i class="fa${isS?'s':'r'} fa-bookmark"></i></button>
<button class="action-btn" onclick="shareMod('${m.$id}','${m.title}')"><i class="fas fa-share-alt"></i></button>
</div></div>`;
}).join('');
}

function toggleSearch(open){
document.getElementById('headerTools').classList.toggle('search-active',open);
if(!open){document.getElementById('searchInput').value='';fetchMods();}
}
function toggleDrop(){document.getElementById('typeMenu').classList.toggle('hidden');}
function updateType(v,t){currentType=v;document.getElementById('typeText').innerText=t;toggleDrop();currentPage=0;fetchMods();}
function toggleSort(){
currentSort=currentSort==='desc'?'asc':'desc';
document.getElementById('sortText').innerText=currentSort==='desc'?'الأحدث':'الأقدم';
document.getElementById('sortIcon').className=currentSort==='desc'?'fas fa-sort-amount-down':'fas fa-sort-amount-up';
fetchMods();
}
function toggleSavedMode(){
savedMode=!savedMode;
document.getElementById('savedModeBtn').classList.toggle('active',savedMode);
if(savedMode)document.getElementById('searchInput').value='';
currentPage=0;fetchMods();
}
function toggleSave(id){
let saved=JSON.parse(localStorage.getItem('lib_saved')||'[]');
const idx=saved.indexOf(id);
if(idx===-1)saved.push(id);else saved.splice(idx,1);
localStorage.setItem('lib_saved',JSON.stringify(saved));
allSavedIds=saved;
fetchMods();
}
function renderPagination(total){
const bar=document.getElementById('paginationBar');
if(total<=itemsPerPage){bar.classList.add('hidden');return;}
bar.classList.remove('hidden');
const pages=Math.ceil(total/itemsPerPage);
let h='';for(let i=0;i<pages;i++){h+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goToPage(${i})">${i+1}</button>`;}
bar.innerHTML=h;
}
function goToPage(p){currentPage=p;fetchMods();window.scrollTo(0,0);}
function openMod(id){window.location.href=`${DOWNLOAD_URL}#${id}`;}
function shareMod(id,title){
const url=`${DOWNLOAD_URL}#${id}`;
if(navigator.share)navigator.share({title:title,url:url});else{navigator.clipboard.writeText(url);alert("تم النسخ");}
}
window.onload=fetchMods;
</script>
<style>
img{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-user-drag:none}
</style>
<script>
document.addEventListener('contextmenu', function(e) {
if (e.target.tagName === 'IMG') e.preventDefault();
}, false);
document.addEventListener('dragstart', function(e) {
if (e.target.tagName === 'IMG') e.preventDefault();
}, false);
</script>
</body>
</html>
