options: { responsive: true, maintainAspectRatio: false, animation: { duration: 800 }, scales: {
x: { ticks: { color: '#777', font: { family: 'Changa', size: 11 } }, grid: { display: false } },

}, plugins: { legend: { display: false } } }
});
}
function toggleDataset(idx) {
active[idx] = !active[idx]; const btn = document.getElementById(`btn-${idx}`); const axis = idx === 0 ? 'y' : 'y1';
if(active[idx]) { chart.data.datasets[idx].data = idx === 0 ? [...currentU] : [...currentD]; chart.options.scales[axis].display = true; btn.classList.remove('inactive'); }
else { chart.data.datasets[idx].data = chart.data.datasets[idx].data.map(() => 0); chart.options.scales[axis].display = false; btn.classList.add('inactive'); }
chart.update();
}
function calculateStats(mKey) {
const cur = data[mKey]; const idx = monthOrder.indexOf(mKey); const prev = data[monthOrder[idx+1]];
const fu = cur.users.filter(v=>v!==null); const fd = cur.downloads.filter(v=>v!==null);
const tU = fu.reduce((a,b)=>a+b,0); const tD = fd.reduce((a,b)=>a+b,0);
const aU = fu.length?(tU/fu.length).toFixed(1):0; const aD = fd.length?(tD/fd.length).toFixed(1):0;
document.getElementById('total-users').textContent = document.getElementById('total-users-card').textContent = tU;
document.getElementById('total-downloads').textContent = document.getElementById('total-downloads-card').textContent = tD;
document.getElementById('avg-users').textContent = document.getElementById('avg-users-card').textContent = aU;
document.getElementById('avg-downloads').textContent = document.getElementById('avg-downloads-card').textContent = aD;
document.getElementById('max-users').textContent = fu.length?Math.max(...fu):0;
document.getElementById('max-downloads').textContent = fd.length?Math.max(...fd):0;
document.getElementById('min-users').textContent = fu.length?Math.min(...fu.filter(v=>v>=0)):0;
document.getElementById('min-downloads').textContent = fd.length?Math.min(...fd.filter(v=>v>=0)):0;
let cU = "N/A", cD = "N/A";
if(prev) {
const pU = prev.users.filter(v=>v!==null).reduce((a,b)=>a+b,0);
const pD = prev.downloads.filter(v=>v!==null).reduce((a,b)=>a+b,0);
if(pU>0) cU = (((tU-pU)/pU)*100).toFixed(1) + "%";
if(pD>0) cD = (((tD-pD)/pD)*100).toFixed(1) + "%";
}
document.getElementById('change-users').innerHTML = formatC(cU); document.getElementById('change-downloads').innerHTML = formatC(cD);
}
function formatC(v) { if(v==="N/A") return v; const n = parseFloat(v); return n>0?`<span class="positive">+${v}</span>`:n<0?`<span class="negative">${v}</span>`:v; }
document.getElementById('month-select').addEventListener('change', function() { createChart(this.value); calculateStats(this.value); active=[true,true]; document.querySelectorAll('.legend-btn').forEach(b=>b.classList.remove('inactive')); });
window.onload = () => { createChart("2026-02/2"); calculateStats("2026-02/2"); };
</script>
