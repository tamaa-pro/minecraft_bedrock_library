<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إحصائيات المكتبة</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      overflow: hidden;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    canvas {
      max-width: 100%;
      height: auto;
    }
    #legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
      cursor: pointer;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .legend-color {
      width: 20px;
      height: 10px;
      border-radius: 2px;
    }
    #summary {
      margin-top: 30px;
      padding: 10px;
      background: #222;
      border-radius: 10px;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    td, th {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #333;
    }
    th {
      background-color: #333;
    }
  </style>
</head>
<body>
  <canvas id="chart"></canvas>
  <div id="legend"></div>
  <div id="summary"></div>  <script>
    const rawData = {
      "2024-03":{ 
        downloads: [12, 13, 11, 16, 22, 27, 29, 31, 18, 20, 17, 23, 25, 19, 22, 20, 19, 15, 21, 18, 22, 28, 27, 26, 25, 29, 30, 30, 35, 31, 33],
        users: [3, 3, 4, 5, 5, 7, 8, 7, 6, 5, 5, 6, 8, 7, 7, 6, 6, 4, 4, 4, 6, 7, 6, 6, 5, 5, 4, 4, 6, 6, 7] },
      "2024-04":{
        downloads: [20, 18, 21, 25, 28, 30, 32, 31, 29, 25, 27, 26, 22, 20, 23, 21, 22, 24, 25, 26, 27, 28, 29, 30, 32, 33, 34, 35, 36, 37],
        users: [6, 6, 7, 8, 9, 10, 10, 9, 8, 8, 8, 8, 7, 6, 6, 6, 6, 6, 7, 7, 8, 8, 9, 9, 9, 10, 11, 11, 12, 12] },
      "2024-05":{
        downloads: [25, 27, 28, 32, 35, 36, 38, 39, 35, 33, 32, 31, 28, 27, 30, 29, 28, 26, 27, 26, 29, 28, 30, 32, 33, 34, 36, 35, 37, 38, 40],
        users: [7, 7, 8, 9, 9, 10, 10, 9, 9, 9, 8, 8, 7, 7, 8, 8, 7, 7, 7, 6, 7, 7, 8, 8, 9, 9, 10, 10, 10, 11, 11] },
      "2024-06":{
        downloads: [30, 32, 34, 36, 37, 39, 40, 41, 42, 43, 44, 45, 46, 45, 44, 43, 42, 41, 40, 39, 38, 37, 36, 35, 34, 33, 32, 31, 30, 29],
        users: [8, 8, 9, 9, 10, 10, 10, 11, 11, 11, 11, 11, 10, 10, 9, 9, 9, 8, 8, 7, 7, 7, 6, 6, 5, 5, 4, 4, 3, 3] },
      "2024-07":{
        downloads: [35, 36, 38, 40, 42, 44, 46, 47, 49, 50, 52, 54, 55, 56, 57, 58, 59, 60, 61],
        users: [9, 9, 10, 10, 11, 11, 12, 12, 13, 13, 14, 14, 15, 15, 16, 16, 17, 17, 18] }
    };

    const months = Object.keys(rawData);
    const currentMonth = months[months.length - 1];
    const downloads = rawData[currentMonth].downloads;
    const users = rawData[currentMonth].users;
    const labels = downloads.map((_, i) => `${i + 1}`);

    const maxY = Math.max(...downloads, ...users);
    const step = Math.ceil(maxY / 50) * 50;

    const ctx = document.getElementById('chart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'التحميلات',
            data: downloads,
            borderColor: 'red',
            backgroundColor: 'red',
            pointRadius: 5,
            pointHoverRadius: 7
          },
          {
            label: 'المستخدمون',
            data: users,
            borderColor: 'blue',
            backgroundColor: 'blue',
            pointRadius: 5,
            pointHoverRadius: 7
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: { intersect: false, mode: 'index' }
        },
        scales: {
          y: {
            beginAtZero: true,
            suggestedMax: step
          }
        },
        onClick(_, elements) {
          if (elements.length > 0) {
            const i = elements[0].index;
            alert(`اليوم ${labels[i]}:\nالتحميلات: ${downloads[i]}\nالمستخدمون: ${users[i]}`);
          }
        }
      }
    });

    document.getElementById('legend').innerHTML = chart.data.datasets.map((ds, i) => `
      <div class="legend-item" onclick="toggleDataset(${i})">
        <div class="legend-color" style="background:${ds.borderColor}"></div>
        <span>${ds.label}</span>
      </div>
    `).join('');

    function toggleDataset(i) {
      chart.getDatasetMeta(i).hidden = !chart.isDatasetVisible(i);
      chart.update();
    }

    function summarize() {
      const sum = arr => arr.reduce((a, b) => a + b, 0);
      const avg = arr => (sum(arr) / arr.length).toFixed(1);
      const min = arr => Math.min(...arr);
      const max = arr => Math.max(...arr);
      const getChange = (key) => {
        if (months.length < 2) return 'لا يوجد بيانات كافية';
        const curr = sum(rawData[months[months.length - 1]][key]);
        const prev = sum(rawData[months[months.length - 2]][key]);
        const diff = curr - prev;
        const perc = ((diff / prev) * 100).toFixed(1);
        return `${diff > 0 ? '+' : ''}${perc}%`;
      };

      document.getElementById('summary').innerHTML = `
        <table>
          <tr><th></th><th>أعلى قيمة</th><th>أقل قيمة</th><th>المجموع</th><th>المتوسط</th><th>النسبة مقارنة بالشهر السابق</th></tr>
          <tr><td>التحميلات</td><td>${max(downloads)}</td><td>${min(downloads)}</td><td>${sum(downloads)}</td><td>${avg(downloads)}</td><td>${getChange('downloads')}</td></tr>
          <tr><td>المستخدمون</td><td>${max(users)}</td><td>${min(users)}</td><td>${sum(users)}</td><td>${avg(users)}</td><td>${getChange('users')}</td></tr>
        </table>
      `;
    }

    summarize();

    // تعطيل التكبير والتصغير باللمس أو الضغط المزدوج
    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('dblclick', e => e.preventDefault());
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=')) e.preventDefault();
    });
  </script></body>
</html>
